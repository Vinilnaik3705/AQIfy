# render.yaml — Render Blueprint (Infrastructure as Code)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aqify-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PUBLIC_BASE_URL
        sync: false          # Set manually in Render dashboard (your Vercel URL)
      - key: RESEND_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
